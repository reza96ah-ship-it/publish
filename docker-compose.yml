# Nashrino - Development Docker Compose
# Local container stack for the app, worker, realtime, PostgreSQL, PgBouncer, and Redis.
# #111: Two Redis instances — redis-queue (noeviction/BullMQ) and redis-cache (LRU/Socket.io)

services:
  app:
    build:
      context: .
      target: app
    ports: ['3000:3000']
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      # CI=true bypasses the strict-prod config checks (localhost URL, dev-default
      # secrets) — this compose file is for local testing only. Real production
      # deployments never set CI=true and use a proper domain NEXTAUTH_URL.
      CI: 'true'
      HOSTNAME: '0.0.0.0'
      DATABASE_URL: postgresql://nashrino:${POSTGRES_PASSWORD:-nashrino_dev}@pgbouncer:6432/nashrino?schema=public&pgbouncer=true&connection_limit=10
      REDIS_URL: redis://redis-queue:6379
      REDIS_CACHE_URL: redis://redis-cache:6379
      # Auth + encryption — values come from .env via env_file above
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ENCRYPTION_KEY_V1: ${ENCRYPTION_KEY_V1}
      ACTIVE_ENCRYPTION_KEY_ID: ${ACTIVE_ENCRYPTION_KEY_ID:-1}
      EMIT_SECRET: ${EMIT_SECRET}
      REALTIME_JWT_SECRET: ${REALTIME_JWT_SECRET}
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis-queue: { condition: service_healthy }
      redis-cache: { condition: service_healthy }
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nashrino:${POSTGRES_PASSWORD:-nashrino_dev}@pgbouncer:6432/nashrino?schema=public&pgbouncer=true&connection_limit=10
      REDIS_QUEUE_URL: redis://redis-queue:6379
      REALTIME_EMIT_URL: http://realtime:3003/emit
      ENCRYPTION_KEY_V1: ${ENCRYPTION_KEY_V1}
      ACTIVE_ENCRYPTION_KEY_ID: ${ACTIVE_ENCRYPTION_KEY_ID:-v1}
      EMIT_SECRET: ${EMIT_SECRET}
    depends_on:
      app: { condition: service_healthy }
      pgbouncer: { condition: service_healthy }
      redis-queue: { condition: service_healthy }
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  realtime:
    build:
      context: .
      target: realtime
    ports: ['3003:3003']
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      REDIS_CACHE_URL: redis://redis-cache:6379
    depends_on:
      redis-cache: { condition: service_healthy }
    healthcheck:
      test:
        [
          'CMD',
          'bun',
          '-e',
          "fetch('http://localhost:3003/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrate
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://nashrino:${POSTGRES_PASSWORD:-nashrino_dev}@pgbouncer:6432/nashrino?schema=public&pgbouncer=true&connection_limit=10
      DIRECT_DATABASE_URL: postgresql://nashrino:${POSTGRES_PASSWORD:-nashrino_dev}@postgres:5432/nashrino?schema=public
    command: ['bunx', 'prisma', 'migrate', 'deploy']
    depends_on:
      postgres: { condition: service_healthy }
    restart: 'no'

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports: ['${PGBOUNCER_PORT:-6432}:6432']
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: nashrino
      DB_PASSWORD: ${POSTGRES_PASSWORD:-nashrino_dev}
      DB_NAME: nashrino
      LISTEN_PORT: '6432'
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: '200'
      DEFAULT_POOL_SIZE: '20'
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -p 6432 -U nashrino -d nashrino']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nashrino
      POSTGRES_USER: nashrino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nashrino_dev}
    ports: ['${POSTGRES_PORT:-5432}:5432']
    volumes: ['pg_data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nashrino -d nashrino']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # #111: BullMQ queue Redis — noeviction, persistent (jobs must not be evicted)
  redis-queue:
    image: redis:7-alpine
    ports: ['6379:6379']
    volumes: ['redis_queue_data:/data']
    command:
      - redis-server
      - --maxmemory-policy noeviction
      - --appendonly yes
      - --appendfsync everysec
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # #111: Cache Redis — LRU eviction, no persistence (disposable cache data)
  redis-cache:
    image: redis:7-alpine
    ports: ['6380:6379']
    command:
      - redis-server
      - --maxmemory 256mb
      - --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
  redis_queue_data:
