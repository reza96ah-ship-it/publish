# Nashrino — Staging deploy workflow
#
# Mirrors the production deploy workflow but targets the staging environment.
# Triggers on every push to the `staging` branch (or manually).
#
# workflow_dispatch with a tag: SKIPS the build and redeploys the existing image.
# workflow_dispatch without a tag / push to staging: builds new images and deploys.
#
# Required secrets (GitHub → Settings → Secrets):
#   STAGING_SSH_HOST        — staging server IP/hostname
#   STAGING_SSH_USER        — SSH user on staging (e.g. "deploy")
#   STAGING_SSH_PRIVATE_KEY — SSH private key for staging
#   STAGING_DOMAIN          — e.g. "staging.nashrino.example.com"

name: Deploy (Staging)

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing image tag to redeploy (leave blank to build from HEAD)'
        required: false
        default: ''

concurrency:
  group: deploy-staging
  cancel-in-progress: true   # staging allows cancellation; production does not

jobs:
  # Resolve the image tag and decide whether a build is needed.
  # Outputs flow to both build-and-push (gated) and deploy (always).
  setup:
    name: Resolve image tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      needs_build: ${{ steps.meta.outputs.needs_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag and build need
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            # Manual redeploy of an existing image — validate and skip build.
            if ! echo "$INPUT_TAG" | grep -qE '^[a-zA-Z0-9._-]+$'; then
              echo "::error::Invalid tag '$INPUT_TAG' — only alphanumeric, '.', '-', '_' are allowed"
              exit 1
            fi
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
            echo "needs_build=false" >> $GITHUB_OUTPUT
            echo "::notice::Redeploying existing image tag '$INPUT_TAG' — build skipped"
          else
            SHA=$(git rev-parse --short HEAD)
            echo "tag=staging-${SHA}" >> $GITHUB_OUTPUT
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build + Push Images (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: setup
    # Skip entirely when redeploying an existing tag via workflow_dispatch.
    if: needs.setup.outputs.needs_build == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push app (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.setup.outputs.tag }}
            ghcr.io/${{ github.repository }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push worker (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-worker:${{ needs.setup.outputs.tag }}
            ghcr.io/${{ github.repository }}-worker:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push realtime (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: realtime
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-realtime:${{ needs.setup.outputs.tag }}
            ghcr.io/${{ github.repository }}-realtime:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push migrate (staging)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrate
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-migrate:${{ needs.setup.outputs.tag }}
            ghcr.io/${{ github.repository }}-migrate:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [setup, build-and-push]
    # Run when setup succeeded AND build either succeeded or was skipped (redeploy path).
    if: always() && needs.setup.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Check staging secrets
        id: staging-secrets
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_DOMAIN: ${{ secrets.STAGING_DOMAIN }}
        run: |
          if [ -n "$STAGING_SSH_HOST" ] && [ -n "$STAGING_SSH_USER" ] && [ -n "$STAGING_SSH_PRIVATE_KEY" ] && [ -n "$STAGING_DOMAIN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Staging deploy skipped — STAGING_SSH_HOST/USER/PRIVATE_KEY/DOMAIN not configured."
          fi

      - name: Deploy to staging via SSH
        if: steps.staging-secrets.outputs.configured == 'true'
        env:
          DEPLOY_TAG: ${{ needs.setup.outputs.tag }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          envs: DEPLOY_TAG
          script: |
            cd /opt/nashrino-staging
            git pull origin staging || true
            export IMAGE_TAG="ghcr.io/reza96ah-ship-it/publish:${DEPLOY_TAG}"
            export IMAGE_TAG_WORKER="ghcr.io/reza96ah-ship-it/publish-worker:${DEPLOY_TAG}"
            export IMAGE_TAG_REALTIME="ghcr.io/reza96ah-ship-it/publish-realtime:${DEPLOY_TAG}"
            export IMAGE_TAG_MIGRATE="ghcr.io/reza96ah-ship-it/publish-migrate:${DEPLOY_TAG}"
            docker compose -f compose.production.yaml pull
            docker compose -f compose.production.yaml up migrate
            docker compose -f compose.production.yaml up -d app worker realtime caddy
            sleep 10
            docker compose -f compose.production.yaml ps

      - name: Smoke test staging
        if: steps.staging-secrets.outputs.configured == 'true'
        run: |
          sleep 20
          DOMAIN="${{ secrets.STAGING_DOMAIN }}"
          echo "=== Health check ==="
          curl -sf "https://$DOMAIN/api/health" | python3 -c "import json,sys; d=json.load(sys.stdin); exit(0 if d.get('ok') else 1)" || {
            echo "::error::Staging health check failed"
            exit 1
          }
          echo "=== Auth endpoint check ==="
          AUTH_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "https://$DOMAIN/auth/signin")
          if [ "$AUTH_STATUS" != "200" ]; then
            echo "::error::Staging auth page not responding (status $AUTH_STATUS)"
            exit 1
          fi
          echo "✓ Staging smoke tests passed"
