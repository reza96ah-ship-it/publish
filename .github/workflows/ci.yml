# Nashrino CI — runs on every push and pull request
# Gates: install → lint → typecheck → test → build → prisma check → security audit
#
# See docs/PRODUCTION_READINESS_MASTER_PLAN.md §11 for the full testing plan.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality gates: lint, typecheck, unit tests ───────────────
  quality:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nashrino
          POSTGRES_PASSWORD: test
          POSTGRES_DB: nashrino_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nashrino"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://nashrino:test@localhost:5432/nashrino_test?schema=public"
      NEXTAUTH_SECRET: "test-secret-not-for-production"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Push schema to test DB
        run: bunx prisma db push --skip-generate

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
        env:
          # Suppress the standalone copy script in CI (it expects .next/standalone)
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Check for pending migrations
        run: bunx prisma migrate diff --exit-code --from-empty --to-schema-datamodel prisma/schema.prisma --shadow-database-url "postgresql://nashrino:test@localhost:5432/nashrino_test?schema=public" || true
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Security audit ──────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies (high/critical)
        run: bun audit --level high || true
        continue-on-error: true

      - name: Check for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ── Docker build (validates the Dockerfile) ─────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run on main branch pushes (skip for PRs to save CI time)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: nashrino:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── E2E tests (Playwright — placeholder, enable in Phase 10) ──
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Disabled until Playwright browser deps are set up (Phase 10)
    if: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2

      - name: Install
        run: bun install --frozen-lockfile

      - name: Run E2E
        run: bun run test:e2e
