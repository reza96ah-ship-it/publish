# Nashrino CI — runs on every push and pull request
# Gates: install → lint → typecheck → test → build → security audit
#
# NOTE: Uses SQLite (matches local dev). Switch to PostgreSQL when a server
# is available in production. See docs/PRODUCTION_READINESS_MASTER_PLAN.md §11.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_test?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_test?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: sed -i "s/provider  = \"sqlite\"/provider  = \"postgresql\"/" prisma/schema.prisma
      - run: bunx prisma generate
      - run: bunx prisma migrate deploy || bunx prisma db push --accept-data-loss
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: bun audit --level high
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on main branch pushes (validates Dockerfile builds)
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: false
          tags: nashrino:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_e2e?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_e2e?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma migrate deploy || bunx prisma db push --accept-data-loss
      - run: bun run prisma/seed.ts
      - run: bun run seed:auth # Seed demo user for E2E
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
