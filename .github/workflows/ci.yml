# Nashrino CI — runs on every push and pull request
# Gates: install → lint → typecheck → test → build → security audit
#
# NOTE: Uses SQLite (matches local dev). Switch to PostgreSQL when a server
# is available in production. See docs/PRODUCTION_READINESS_MASTER_PLAN.md §11.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_test?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_test?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: sed -i "s/provider  = \"sqlite\"/provider  = \"postgresql\"/" prisma/schema.prisma
      - run: bunx prisma generate
      - run: bunx prisma migrate deploy || bunx prisma db push --accept-data-loss
      - run: bun run lint
      - run: bun run typecheck
      # Issue #123: typecheck mini-services with strict mode (noImplicitAny + noUncheckedIndexedAccess)
      - name: Typecheck publish-worker (strict)
        working-directory: mini-services/publish-worker
        run: |
          bun install --frozen-lockfile
          bunx prisma generate --schema=../../prisma/schema.prisma
          bunx tsc --noEmit
      - name: Typecheck realtime (strict)
        working-directory: mini-services/realtime
        run: |
          bun install --frozen-lockfile
          bunx prisma generate --schema=../../prisma/schema.prisma
          bunx tsc --noEmit
      - run: bun run test
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  security:
    name: Security Audit (Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Issue #122: all security gates must be blocking — no continue-on-error.
    # If any step fails, the entire pipeline fails.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for secret scanning
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile

      # 1. Dependency CVE audit — fail on critical only.
      # HIGH is excluded: Next.js 16.1.1 and transitive devDeps (lodash via recharts,
      # minimatch via eslint) carry known HIGH advisories that cannot be patched without
      # a major framework upgrade. Track those separately; block only on CRITICAL here.
      - name: Dependency audit (bun audit --level critical)
        run: bun audit --level critical

      # 2. Secret scan — trufflehog pinned to tag (v3.63.11 is the latest stable)
      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@v3.63.11
        with:
          path: .
          extra_args: --results=verified,unknown

      # 3. License compliance — fail on GPL-3.0 (incompatible with proprietary)
      # Bug fix: use bunx (picks up the installed version from package.json devDeps)
      # instead of npx which downloads an unpinned version at runtime.
      - name: License check (no GPL-3.0)
        run: bunx license-checker --failOn "GPL-3.0;GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0"

      # 4. Static analysis — CodeQL
      - name: CodeQL init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3

      # 5. Container scan — trivy on the built Docker image
      - name: Build image for scan
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: false
          tags: nashrino:scan
          load: true
      - name: Container scan (trivy — HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: nashrino:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run on main branch pushes (validates Dockerfile builds)
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: false
          tags: nashrino:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_e2e?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_e2e?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma migrate deploy || bunx prisma db push --accept-data-loss
      - run: bun run prisma/seed.ts
      - run: bun run seed:auth # Seed demo user for E2E
      - run: bunx playwright install --with-deps chromium
      - run: bun run test:e2e
