# Nashrino CI — runs on every push and pull request
# Gates: install → migrate → lint → typecheck → test → build → security audit → docker → e2e
#
# Issue #141: Release-safe CI. No db push fallback. Migration status + schema-drift
# checks. All images (app/worker/realtime/migrate) build in CI. SBOM + provenance.
#
# GitHub Actions versioning policy (Issue #141):
# Actions are pinned to major version tags (v4, v3, v2) rather than commit SHAs.
# This is a controlled exception — SHA pinning is ideal for supply-chain security
# but creates maintenance burden for a small team. Major-version tags are maintained
# by the action owners and receive security patches. When the team grows, migrate
# to SHA pinning with Dependabot automation.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_test?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_test?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      # Issue #146 follow-up: ffmpeg/ffprobe for video-probe.ts (duration/codec/thumbnail) —
      # video-probe.test.ts exercises the real binary against a synthetic test clip.
      - name: Install ffmpeg
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: bun install --frozen-lockfile

      # Issue #141: Migrations must be deterministic — no db push fallback.
      # Run only `prisma migrate deploy` against the fresh PostgreSQL service.
      # If migrations are broken, CI fails. No silent schema mutation.
      - run: bunx prisma generate
      - name: Run migrations (no db push fallback)
        run: bunx prisma migrate deploy
      # Issue #141: Verify migration history is consistent — fail if drift detected
      - name: Check migration status
        run: |
          bunx prisma migrate status
          # migrate status exits 1 if there are pending migrations or drift
      # Issue #141: Schema-drift check — fail if schema.prisma has changes not yet
      # captured in a migration. Uses the live CI database (migrations already applied
      # by the migrate status step above) as the baseline via --from-config-datasource.
      # This avoids the shadow DB requirement that --from-migrations imposes in Prisma 7.
      - name: Schema-drift check (migrate diff)
        run: |
          if ! DIFF=$(bunx prisma migrate diff \
            --from-config-datasource \
            --to-schema prisma/schema.prisma \
            --exit-code 2>&1); then
            echo "::error::Schema drift detected — prisma/schema.prisma has changes not captured in a migration. Run 'bunx prisma migrate dev --name <name>' to create a migration."
            echo "$DIFF"
            exit 1
          fi
          echo "✓ No schema drift — schema.prisma matches the applied database state"

      - run: bun run lint
      # Issues #229 #230 #231 #235: consolidated design-system gate
      # (palette leaks, physical RTL classes, arbitrary type scale)
      - name: Design lint (lint:design)
        run: bun run lint:design
      # Issue #159: detect UTF-8 BOM and mojibake in source files
      - run: bash scripts/check-mojibake.sh
      - run: bun run typecheck
      # Issue #123: typecheck mini-services with strict mode (noImplicitAny + noUncheckedIndexedAccess)
      - name: Typecheck publish-worker (strict)
        working-directory: mini-services/publish-worker
        run: |
          bun install --frozen-lockfile
          bunx prisma generate --schema=../../prisma/schema.prisma
          bunx tsc --noEmit
      - name: Typecheck realtime (strict)
        working-directory: mini-services/realtime
        run: |
          bun install --frozen-lockfile
          bunx prisma generate --schema=../../prisma/schema.prisma
          bunx tsc --noEmit
      - run: bun run test
      # Issue #153: integration tests against real PostgreSQL + Redis
      - name: Run integration tests (PG + Redis)
        run: bun run test:integration
        env:
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_test?schema=public&connection_limit=10'
          DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_test?schema=public'
          REDIS_URL: 'redis://localhost:6379'
          REDIS_QUEUE_URL: 'redis://localhost:6379'
          NEXTAUTH_SECRET: 'test-secret-not-for-production'
      - run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000
      # Issue #157: enforce per-route JS bundle budgets after build
      - run: bun run scripts/check-bundle-budgets.ts

      # Issue #141: Upload all reports as artifacts for release evidence
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 30
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 30
          if-no-files-found: ignore

  security:
    name: Security Audit (Blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # CodeQL requires security-events: write to upload SARIF results to GitHub
    # Code Scanning. contents: read is needed for checkout.
    permissions:
      contents: read
      security-events: write
    # Issue #122: all security gates must be blocking — no continue-on-error.
    # If any step fails, the entire pipeline fails.
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history for secret scanning
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile

      # 1. Dependency CVE audit — fail on critical only, excluding one accepted devDep CVE.
      # HIGH is excluded: Next.js 16.1.1 and transitive devDeps carry known HIGH advisories
      # that cannot be patched without a major framework upgrade.
      # GHSA-5xrq-8626-4rwp (@vitest/ui): affects the UI dev server only; that server is
      # never started in CI or production. Accepted as dev-only risk until vitest 3 is stable.
      # NOTE: bun audit exits 1 when it finds any vuln at the specified level. We pipe to tee
      # and use || true so set -eo pipefail does not abort the step before the grep filter runs.
      - name: Dependency audit (bun audit --level critical)
        run: |
          bun audit --level critical 2>&1 | tee /tmp/audit.txt || true
          if grep "critical:" /tmp/audit.txt | grep -qv "GHSA-5xrq-8626-4rwp"; then
            echo "::error::Unacceptable critical vulnerabilities found"
            exit 1
          fi
          echo "Audit passed (GHSA-5xrq-8626-4rwp accepted: devDep UI server, never run in CI/prod)"

      # 2. Secret scan — trufflehog pinned to tag (v3.63.11 is the latest stable)
      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@v3.63.11
        with:
          path: .
          extra_args: --results=verified,unknown

      # 3. License compliance — fail on GPL-3.0 (incompatible with proprietary)
      # Bug fix: use bunx (picks up the installed version from package.json devDeps)
      # instead of npx which downloads an unpinned version at runtime.
      - name: License check (no GPL-3.0)
        run: bunx license-checker --failOn "GPL-3.0;GPL-3.0-only;GPL-3.0-or-later;AGPL-3.0"

      # 4. Static analysis — CodeQL
      - name: CodeQL init
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v4

      # 5. Container scan — trivy on the built Docker image
      - name: Build image for scan
        uses: docker/build-push-action@v7
        with:
          context: .
          target: app
          push: false
          tags: nashrino:scan
          load: true
      - name: Container scan (trivy — HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: nashrino:scan
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  docker:
    name: Docker Build (all targets)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Issue #141: build ALL Docker targets in CI — app, worker, realtime, migrate.
    # If any target fails to build, CI fails and deployment is blocked.
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - name: Build app image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: app
          push: false
          tags: nashrino:ci-app
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: worker
          push: false
          tags: nashrino:ci-worker
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build realtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: realtime
          push: false
          tags: nashrino:ci-realtime
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build migrate image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: migrate
          push: false
          tags: nashrino:ci-migrate
          cache-from: type=gha
          cache-to: type=gha,mode=max

  load-gate:
    name: Load Gate (k6 smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_load
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_load"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_load?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_load?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - name: Run migrations
        run: bunx prisma migrate deploy
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -y && sudo apt-get install -y k6
      - name: Build Next.js app (needed for bun run start)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXTAUTH_SECRET: 'test-secret-not-for-production'
          NEXTAUTH_URL: 'http://localhost:3000'
      - name: Start Next.js server (pre-built — starts in seconds)
        # Run standalone server with node (not bun) — Next.js standalone injects
        # __import_unsupported via Node.js module system; bun does not provide it.
        # NODE_ENV=test skips the production secret validation.
        run: NODE_ENV=test node .next/standalone/server.js &
        env:
          NEXTAUTH_SECRET: 'test-secret-not-for-production'
          NEXTAUTH_URL: 'http://localhost:3000'
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_load?schema=public&connection_limit=10'
          REDIS_URL: 'redis://localhost:6379'
      - name: Wait for server (up to 60s)
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server is up after $((i * 5))s"
              exit 0
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done
          echo "::error::Server did not respond within 60s"
          exit 1
      - name: Run k6 smoke test (blocking gate)
        run: k6 run k6/smoke.js
      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-smoke-results
          path: k6/results/
          retention-days: 30
          if-no-files-found: ignore

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_e2e?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_e2e?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      # Issue #141: no db push fallback in E2E either
      - run: bunx prisma migrate deploy
      - run: bun run prisma/seed.ts
      - run: bun run seed:auth # Seed demo user for E2E
      - name: Build Next.js app (E2E uses bun run start — pre-built server)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXTAUTH_SECRET: 'test-secret-not-for-production'
          NEXTAUTH_URL: 'http://localhost:3000'
      - run: bunx playwright install --with-deps chromium firefox webkit
      - run: bun run test:e2e

  visual:
    name: Visual Regression (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Baselines committed — visual failures now block merge.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_visual
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_visual"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_visual?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_visual?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma migrate deploy
      - run: bun run prisma/seed.ts
      - run: bun run seed:auth
      - name: Build Next.js app
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXTAUTH_SECRET: 'test-secret-not-for-production'
          NEXTAUTH_URL: 'http://localhost:3000'
      - run: bunx playwright install --with-deps chromium
      - name: Run visual regression tests
        run: bun run test:visual
      - name: Upload visual diff report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: visual-diff-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload new snapshots (if missing)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: visual-snapshots
          path: tests/e2e/visual.spec.ts-snapshots/
          retention-days: 30
          if-no-files-found: ignore

  lighthouse:
    name: Lighthouse CI (a11y + best-practices + SEO)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Accessibility threshold (≥0.85) is enforced as an error in .lighthouserc.json.
    # The job is continue-on-error so a flaky Lighthouse run never blocks a merge —
    # a dedicated axe-core E2E gate already enforces WCAG 2.2 AA. Once baselines
    # are stable, remove continue-on-error to make Lighthouse fully blocking.
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nashrino_lhci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nashrino_lhci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_lhci?schema=public&connection_limit=10'
      DIRECT_DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_lhci?schema=public'
      NEXTAUTH_SECRET: 'test-secret-not-for-production'
      NEXTAUTH_URL: 'http://localhost:3000'
      REDIS_URL: 'redis://localhost:6379'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2
      - run: bun install --frozen-lockfile
      - run: bunx prisma generate
      - run: bunx prisma migrate deploy
      - name: Build Next.js app (pre-built standalone server)
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
          NEXTAUTH_SECRET: 'test-secret-not-for-production'
          NEXTAUTH_URL: 'http://localhost:3000'
      - name: Start Next.js server (pre-built — starts in seconds)
        # node, not bun — Next.js standalone server.js targets the Node.js
        # module system. NODE_ENV=test skips production secret validation.
        run: NODE_ENV=test node .next/standalone/server.js &
        env:
          NEXTAUTH_SECRET: 'test-secret-not-for-production'
          NEXTAUTH_URL: 'http://localhost:3000'
          DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/nashrino_lhci?schema=public&connection_limit=10'
          REDIS_URL: 'redis://localhost:6379'
      - name: Wait for server (up to 60s)
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server ready after $((i * 5))s"
              exit 0
            fi
            echo "Waiting... ($i/12)"
            sleep 5
          done
          echo "::error::Server did not respond within 60s"
          exit 1
      - name: Run Lighthouse CI
        run: bunx @lhci/cli@0.14.x autorun --config=.lighthouserc.json
      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 30
