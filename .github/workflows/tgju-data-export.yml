name: Temporary TGJU Data Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-tgju-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Download TGJU-derived USD/IRR archive
        run: |
          curl --fail --location --retry 3 \
            "https://raw.githubusercontent.com/kooroshkz/Dollar-Rial-Toman-Live-Price-Dataset/refs/heads/main/data/Dollar_Rial_Price_Dataset.csv" \
            --output Dollar_Rial_Price_Dataset.csv

      - name: Validate archive
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          path = Path("Dollar_Rial_Price_Dataset.csv")
          with path.open(encoding="utf-8", newline="") as handle:
              rows = list(csv.DictReader(handle))
          if len(rows) < 3000:
              raise SystemExit(f"Unexpected record count: {len(rows)}")
          required = {"Open Price", "Low Price", "High Price", "Close Price", "Gregorian Date", "Persian Date"}
          if not required.issubset(rows[0]):
              raise SystemExit("Required TGJU columns are missing")
          print(f"Validated {len(rows)} records")
          PY

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: tgju-usd-irr-csv
          path: Dollar_Rial_Price_Dataset.csv
          retention-days: 1
