# Nashrino — Deploy workflow
# Builds Docker images, pushes to GHCR, deploys to production server.
#
# Required secrets (GitHub → Settings → Secrets):
#   SSH_HOST          — production server IP/hostname
#   SSH_USER          — SSH user (e.g. "deploy")
#   SSH_PRIVATE_KEY   — SSH private key
#   PRODUCTION_DOMAIN — e.g. "nashrino.example.com"

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (default: commit SHA)'
        required: false
        default: ''

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build + Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push app
        uses: docker/build-push-action@v5
        with:
          context: .
          target: app
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          target: worker
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-worker:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push realtime
        uses: docker/build-push-action@v5
        with:
          context: .
          target: realtime
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-realtime:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}-realtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check production secrets
        id: production-secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          PRODUCTION_DOMAIN: ${{ secrets.PRODUCTION_DOMAIN }}
        run: |
          if [ -n "$SSH_HOST" ] && [ -n "$SSH_USER" ] && [ -n "$SSH_PRIVATE_KEY" ] && [ -n "$PRODUCTION_DOMAIN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Production deploy skipped because SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, or PRODUCTION_DOMAIN is not configured."
          fi

      - name: Deploy via SSH
        if: steps.production-secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/nashrino
            git pull origin main
            export IMAGE_TAG=ghcr.io/reza96ah-ship-it/publish:${{ needs.build-and-push.outputs.tag }}
            export IMAGE_TAG_WORKER=ghcr.io/reza96ah-ship-it/publish-worker:${{ needs.build-and-push.outputs.tag }}
            export IMAGE_TAG_REALTIME=ghcr.io/reza96ah-ship-it/publish-realtime:${{ needs.build-and-push.outputs.tag }}
            docker compose -f compose.production.yaml pull
            docker compose -f compose.production.yaml up -d
            sleep 10
            docker compose -f compose.production.yaml ps

      - name: Health check
        if: steps.production-secrets.outputs.configured == 'true'
        run: |
          sleep 30
          curl -sf https://${{ secrets.PRODUCTION_DOMAIN }}/api/health | \
            python3 -c "import json,sys; d=json.load(sys.stdin); exit(0 if d.get('ok') else 1)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deploy failed! Rollback: ./scripts/rollback.sh <previous-tag>"
          exit 1
