# Nashrino — Production Docker Compose
# Immutable images, internal-only Redis, Caddy TLS, migration runner, resource limits.

services:
  app:
    image: ${IMAGE_TAG:-ghcr.io/reza96ah-ship-it/publish:latest}
    restart: always
    env_file: .env.production
    environment:
      - NODE_ENV=production
    depends_on:
      redis: { condition: service_healthy }
    deploy:
      replicas: 2
      resources:
        limits: { memory: 1G, cpus: "1.0" }
        reservations: { memory: 256M }
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks: [default, internal]

  worker:
    image: ${IMAGE_TAG_WORKER:-ghcr.io/reza96ah-ship-it/publish-worker:latest}
    restart: always
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - REALTIME_EMIT_URL=http://realtime:3003/emit
    depends_on:
      app: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 512M, cpus: "0.5" }
        reservations: { memory: 128M }
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [default, internal]

  realtime:
    image: ${IMAGE_TAG_REALTIME:-ghcr.io/reza96ah-ship-it/publish-realtime:latest}
    restart: always
    env_file: .env.production
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3003/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [default, internal]

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: ["redis_data:/data"]
    deploy:
      resources:
        limits: { memory: 512M, cpus: "0.5" }
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  migrate:
    image: ${IMAGE_TAG:-ghcr.io/reza96ah-ship-it/publish:latest}
    restart: "no"
    env_file: .env.production
    environment:
      - NODE_ENV=production
    command: ["bunx", "prisma", "db", "push", "--accept-data-loss"]
    depends_on:
      app: { condition: service_healthy }
    networks: [default, internal]

  caddy:
    image: caddy:2-alpine
    restart: always
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app: { condition: service_healthy }
      realtime: { condition: service_healthy }
    networks: [default]

networks:
  default:
  internal:
    internal: true

volumes:
  redis_data:
  caddy_data:
  caddy_config:
