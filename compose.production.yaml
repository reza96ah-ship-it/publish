# Nashrino - Production Docker Compose
# Immutable images, Postgres + PgBouncer, internal Redis, Caddy TLS, migration runner.

services:
  app:
    image: ${IMAGE_TAG:-ghcr.io/reza96ah-ship-it/publish:latest}
    restart: always
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://nashrino:${POSTGRES_PASSWORD}@pgbouncer:6432/nashrino?schema=public&pgbouncer=true&connection_limit=10}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://nashrino:${POSTGRES_PASSWORD}@postgres:5432/nashrino?schema=public}
    depends_on:
      migrate: { condition: service_completed_successfully }
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      replicas: 2
      resources:
        limits: { memory: 1G, cpus: "1.0" }
        reservations: { memory: 256M }
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks: [default, internal]

  worker:
    image: ${IMAGE_TAG_WORKER:-ghcr.io/reza96ah-ship-it/publish-worker:latest}
    restart: always
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://nashrino:${POSTGRES_PASSWORD}@pgbouncer:6432/nashrino?schema=public&pgbouncer=true&connection_limit=10}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://nashrino:${POSTGRES_PASSWORD}@postgres:5432/nashrino?schema=public}
      REALTIME_EMIT_URL: http://realtime:3003/emit
    depends_on:
      migrate: { condition: service_completed_successfully }
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      realtime: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 512M, cpus: "0.5" }
        reservations: { memory: 128M }
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [default, internal]

  realtime:
    image: ${IMAGE_TAG_REALTIME:-ghcr.io/reza96ah-ship-it/publish-realtime:latest}
    restart: always
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3003/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks: [default, internal]

  migrate:
    image: ${IMAGE_TAG:-ghcr.io/reza96ah-ship-it/publish:latest}
    restart: "no"
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://nashrino:${POSTGRES_PASSWORD}@pgbouncer:6432/nashrino?schema=public&pgbouncer=true&connection_limit=10}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL:-postgresql://nashrino:${POSTGRES_PASSWORD}@postgres:5432/nashrino?schema=public}
    command: ["bunx", "prisma", "migrate", "deploy"]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: nashrino
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: nashrino
      LISTEN_PORT: "6432"
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "20"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    depends_on:
      postgres: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.25" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U nashrino -d nashrino"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: nashrino
      POSTGRES_USER: nashrino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: ["pg_data:/var/lib/postgresql/data"]
    deploy:
      resources:
        limits: { memory: 1G, cpus: "1.0" }
        reservations: { memory: 256M }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nashrino -d nashrino"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes: ["redis_data:/data"]
    deploy:
      resources:
        limits: { memory: 512M, cpus: "0.5" }
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: always
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app: { condition: service_healthy }
      realtime: { condition: service_healthy }
    networks: [default]

networks:
  default:
  internal:
    internal: true

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
